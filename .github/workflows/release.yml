name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

# Don't run two release builds at once for the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: olykov/zendesk-url-redirector

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch,prefix=${{ matrix.service }}-
            type=semver,pattern={{version}},prefix=${{ matrix.service }}-
            type=raw,value=${{ matrix.service }}-latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short,prefix=${{ matrix.service }}-sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Buildx GHA cache, scoped per service so backend and frontend
          # don't trash each other's layers.
          cache-from: type=gha,scope=${{ matrix.service }}-v2
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-v2
          # INTERNAL_API_URL is baked into the frontend bundle at build time
          # (Next.js inlines `rewrites()` destinations into routes-manifest).
          # Backend ignores unknown ARGs, so passing it to both is harmless.
          build-args: |
            INTERNAL_API_URL=http://backend:4000
