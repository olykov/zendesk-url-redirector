name: Verify

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same PR/branch when a new commit arrives.
concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads pnpm version from `packageManager` in root package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared
        run: pnpm --filter @redirector/shared typecheck

      - name: Typecheck backend
        run: pnpm --filter backend typecheck

      # `next build` runs Next.js's own TypeScript checking and also
      # generates `.next/types/` (referenced by next-env.d.ts). Running
      # `tsc --noEmit` against the frontend without first generating
      # those types is unreliable on fresh CI runners.
      - name: Build frontend (includes typecheck)
        run: pnpm --filter frontend build
        env:
          INTERNAL_API_URL: http://backend:4000
